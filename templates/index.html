<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 行事曆助理</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="apple-touch-icon" href="/static/icons/icon.png">
    <link rel="icon" type="image/png" href="/static/icons/icon.png">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="app-container">
        <!-- Header -->
        <div class="header">
            <h1>AI 專屬秘書</h1>
            <p>您的個人智慧管家</p>
        </div>

        <!-- 指揮中心：層級式樹狀導航 -->
    <div class="action-card">
        <!-- 第一層：母分頁 -->
        <div class="parent-tabs">
            <button class="tab-btn active" onclick="switchTab('schedule', event)">📅 行程</button>
            <button class="tab-btn" onclick="switchTab('finance', event)">💰 記帳</button>
            <button class="tab-btn" onclick="switchTab('memo', event)">📝 備忘</button>
        </div>
        
        <!-- 第二層：子功能選單 -->
        <div class="sub-menu-area">
            <!-- 行程子選單 -->
            <div id="sub_schedule" class="sub-menu active">
                <button class="sub-btn" onclick="openModal('scheduleModal')">➕ 新增</button>
                <button class="sub-btn" onclick="querySchedule(1)">📅 今日</button>
                <button class="sub-btn" onclick="querySchedule(7)">🗓️ 本週</button>
                <button class="sub-btn" onclick="querySchedule(30)">📊 本月</button>
            </div>
            <!-- 記帳子選單 -->
            <div id="sub_finance" class="sub-menu">
                <button class="sub-btn" onclick="queryFinanceSummary()">📊 本月合計</button>
                <button class="sub-btn" onclick="openModal('expenseModal')">💰 我要記帳</button>
                <button class="sub-btn" onclick="window.open('https://docs.google.com/spreadsheets/d/1RkhMRiRBIn7zYJKuT0Qr4tXCx-VxjBF3c6AuYOR3mgg', '_blank')">☁️ 雲端帳簿</button>
            </div>
            <!-- 備忘子選單 -->
            <div id="sub_memo" class="sub-menu">
                <button class="sub-btn" onclick="openModal('memoModal')">📔 日記</button>
                <button class="sub-btn" onclick="openModal('todoModal')">✅ 待辦</button>
                <button class="sub-btn" onclick="openModal('pocketModal')">📍 口袋</button>
                <button class="sub-btn" onclick="openModal('wishlistModal')">🎁 願望</button>
            </div>
        </div>
    </div>

    <!-- 待辦事項彈窗 -->
    <div id="todoModal" class="modal-backdrop">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal('todoModal')">✕</button>
            <h2 class="modal-title">✅ 待辦清單</h2>
            <div class="modal-body">
                <!-- 整合式輸入區域 (V10.9 改回穩定版) -->
                <div style="display: flex; gap: 8px; margin-bottom: 15px; align-items: center; width: 100%;">
                    <div id="todo_category_selector" class="custom-select" style="width: 105px; position: relative; flex-shrink: 0;">
                        <div id="selected_todo_cat" onclick="toggleTodoCategoryDropdown()" style="padding: 10px 8px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 0.8rem; background: #fff; cursor: pointer; display: flex; justify-content: space-between; align-items: center; min-height: 42px; white-space: nowrap; overflow: hidden;">
                            <span id="current_todo_cat_display" style="overflow: hidden; text-overflow: ellipsis;">請選擇</span>
                            <small style="color: #94a3b8; font-size: 0.6rem;">▼</small>
                        </div>
                        <input type="hidden" id="todo_category" value="">
                    </div>
                    <input type="text" id="todo_title" 
                           placeholder="輸入新任務..." 
                           autocomplete="off" 
                           style="flex: 1; min-width: 0; padding: 10px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 0.9rem; height: 42px; outline: none; background: #fff;">
                    <button id="submitTodoBtn" onclick="saveTodo()" style="background: #3b82f6; color: white; border: none; width: 32px; height: 32px; border-radius: 10px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; opacity: 0.3; pointer-events: none; transition: all 0.2s;">✓</button>
                </div>
                
                <!-- 類別下拉選單容器 -->
                <div id="todo_cat_dropdown" class="todo-dropdown-content">
                    <!-- 動態生成類別選項 -->
                </div>

                <!-- 優先級選擇區 (更精簡) -->
                <div style="display: flex; gap: 10px; margin-top: 15px; overflow-x: auto; padding-bottom: 5px; -webkit-overflow-scrolling: touch;">
                    <div class="priority-opt red" data-value="急要" onclick="selectPriority(this, '急要')" style="padding: 6px 12px; font-size: 0.8rem;">🔴 急要</div>
                    <div class="priority-opt yellow" data-value="重要" onclick="selectPriority(this, '重要')" style="padding: 6px 12px; font-size: 0.8rem;">🟡 重要</div>
                    <div class="priority-opt orange" data-value="緊急" onclick="selectPriority(this, '緊急')" style="padding: 6px 12px; font-size: 0.8rem;">🟠 緊急</div>
                    <div class="priority-opt green active" data-value="一般" onclick="selectPriority(this, '一般')" style="padding: 6px 12px; font-size: 0.8rem;">🟢 一般</div>
                    <input type="hidden" id="todo_priority" value="一般">
                </div>

                <!-- 任務清單與篩選 (V10.9 統一下拉式) -->
                <div id="todo_filter_area" style="display: flex; gap: 8px; margin: 15px 0; align-items: center;">
                    <select id="todo_filter_cat" onchange="window.loadTodos(this.value)" 
                            style="flex: 1; padding: 10px; border-radius: 12px; border: 1.5px solid #f1f5f9; background: #f8fafc; font-size: 0.85rem; font-weight: 600; color: #475569; outline: none; cursor: pointer; appearance: none; background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%2394a3b8%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E'); background-repeat: no-repeat; background-position: right 8px center; background-size: 16px;">
                        <option value="全部">📝 全部任務</option>
                    </select>
                </div>
                
                <div id="todo_list" style="max-height: 400px; overflow-y: auto; padding: 5px;">
                    <!-- 任務清單會顯示在這裡 -->
                </div>

                <div style="text-align: center; margin-top: 20px; border-top: 1px solid #f1f5f9; padding-top: 15px;">
                    <a href="https://docs.google.com/spreadsheets/d/1U0qqrOl9sA4ipBteS9WSmLE-w0W3BkIn-t2ATVcT_sM/edit" target="_blank" style="color: #64748b; font-size: 0.8rem; text-decoration: none; border-bottom: 1px solid #cbd5e1; padding-bottom: 2px;">🔗 打開雲端待辦清單</a>
                </div>
            </div>
        </div>
    </div>

        <!-- 對話紀錄區 -->
        <div id="chat-history">
        </div>

        <button id="clearBtn" class="clear-btn" title="清空對話">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y1="17"></line><line x1="14" y1="11" x2="14" y1="17"></line></svg>
        </button>

        <!-- 底部輸入區域 -->
        <div class="input-area">
            <div class="input-container">
                <button id="voiceBtn" class="voice-btn">
                    🎙️
                </button>
                <input type="text" id="userInput" placeholder="輸入行程或指令...">
                <button id="sendBtn" class="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- 手動行程彈窗 -->
    <div id="scheduleModal" class="modal-backdrop">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal('scheduleModal')">✕</button>
            <h2 class="modal-title">📅 新增行程</h2>
            <div class="modal-body">
                <div class="form-group">
                    <label>行程內容</label>
                    <input type="text" id="manual_summary" class="form-input" placeholder="要做什麼？">
                </div>
                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <label style="margin-bottom: 0;">日期</label>
                        <div style="display: flex; align-items: center; gap: 5px;">
                            <input type="checkbox" id="manual_all_day" style="width: 16px; height: 16px; cursor: pointer;" onchange="document.getElementById('time_input_wrapper').style.display = this.checked ? 'none' : 'flex'">
                            <label for="manual_all_day" style="margin-bottom: 0; cursor: pointer; font-size: 0.9rem; color: #64748b;">全天行程</label>
                        </div>
                    </div>
                    <input type="date" id="manual_date" class="form-input">
                </div>

                <div id="time_input_wrapper" class="form-group" style="display: flex; flex-direction: column;">
                    <label>時間</label>
                    <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
                        <select id="manual_ampm" class="form-input" style="width: 70px; text-align: center; cursor: pointer;">
                            <option value="AM">上午</option>
                            <option value="PM" selected>下午</option>
                        </select>
                        <select id="manual_hour" class="form-input" style="width: 70px; text-align: center; cursor: pointer;">
                            <option value="1">01</option><option value="2">02</option><option value="3">03</option>
                            <option value="4">04</option><option value="5">05</option><option value="6">06</option>
                            <option value="7">07</option><option value="8">08</option><option value="9">09</option>
                            <option value="10">10</option><option value="11">11</option><option value="12" selected>12</option>
                        </select>
                        <span style="font-weight: bold;">:</span>
                        <select id="manual_minute" class="form-input" style="width: 70px; text-align: center; cursor: pointer;">
                            <option value="00">00</option>
                            <option value="15">15</option>
                            <option value="30">30</option>
                            <option value="45">45</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>地點 / 線上視訊</label>
                    <input type="text" id="manual_location" class="form-input" placeholder="在哪裡？或是視訊連結">
                </div>
                <button id="submitSchedule" class="submit-btn btn-schedule">確認加入日曆</button>
            </div>
        </div>
    </div>

    <!-- 口袋名單 Modal (V10.4) -->
    <div id="pocketModal" class="modal-backdrop">
        <div class="modal-content" style="max-width: 450px;">
            <div class="modal-header">
                <h3 class="modal-title">📍 口袋名單</h3>
                <button class="close-modal" onclick="closeModal('pocketModal')">✕</button>
            </div>
            
            <div style="padding: 15px; background: #f8fafc; border-bottom: 1px solid #f1f5f9;">
                <div style="display: flex; gap: 8px; margin-bottom: 10px; align-items: center; width: 100%;">
                    <div id="custom_cat_dropdown" class="custom-select" style="width: 110px; position: relative; flex-shrink: 0;">
                        <div id="selected_cat" onclick="toggleCatDropdown()" style="padding: 10px 8px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 0.8rem; background: #fff; cursor: pointer; display: flex; justify-content: space-between; align-items: center; min-height: 42px; white-space: nowrap; overflow: hidden;">
                            <span style="overflow: hidden; text-overflow: ellipsis;">請選擇</span>
                            <small style="color: #94a3b8; font-size: 0.6rem;">▼</small>
                        </div>
                        <div id="cat_options" class="cat-options" style="display: none; position: absolute; top: 100%; left: 0; width: 180px; background: white; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); z-index: 1000; max-height: 250px; overflow-y: auto; margin-top: 5px; padding: 10px;"></div>
                    </div>
                    <input type="text" id="pocket_name" placeholder="搜尋店名或景點" style="flex: 1; min-width: 0; padding: 10px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 0.9rem; height: 42px;">
                    <button id="submitPocket" style="background: #14b8a6; color: white; border: none; width: 32px; height: 32px; border-radius: 10px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; opacity: 0.3; pointer-events: none; transition: all 0.2s;">✓</button>
                </div>
                <input type="text" id="pocket_location" placeholder="地址 (自動填入)" style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 0.9rem; margin-bottom: 8px; background: #f1f5f9; height: 42px;" readonly>
                <div id="detected_area_display" style="font-size: 0.75rem; color: #0d9488; margin-bottom: 10px; padding-left: 5px; font-weight: 600; display: none;">📍 偵測區域：<span id="detected_area_val"></span></div>
                <input type="hidden" id="pocket_area" value="">
                <input type="text" id="pocket_note" placeholder="備註 (選填)" style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 0.9rem; height: 42px;">
            </div>

            <!-- 高級過濾區域 (V10.9 改用下拉式) -->
            <div style="display: flex; gap: 10px; padding: 12px 15px; background: #fff; border-bottom: 1px solid #f1f5f9;">
                <select id="pocket_filter_cat" onchange="window.setPocketFilter(this.value)" 
                        style="flex: 1; padding: 10px; border-radius: 12px; border: 1.5px solid #f1f5f9; background: #f8fafc; font-size: 0.85rem; font-weight: 600; color: #475569; outline: none; cursor: pointer; appearance: none; background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%2394a3b8%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E'); background-repeat: no-repeat; background-position: right 8px center; background-size: 16px;">
                    <option value="全部">🌟 全部類別</option>
                </select>
                <select id="pocket_filter_area" onchange="window.setAreaFilter(this.value)" 
                        style="flex: 1; padding: 10px; border-radius: 12px; border: 1.5px solid #f1f5f9; background: #f8fafc; font-size: 0.85rem; font-weight: 600; color: #475569; outline: none; cursor: pointer; appearance: none; background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%2394a3b8%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E'); background-repeat: no-repeat; background-position: right 8px center; background-size: 16px;">
                    <option value="全部">📍 全部地區</option>
                </select>
            </div>

            <div id="pocket_list" style="padding: 10px; max-height: 45vh; overflow-y: auto;">
                <!-- 清單載入處 -->
            </div>

            <!-- 底部功能連結 -->
            <div style="padding: 15px; text-align: center; border-top: 1px solid #f1f5f9;">
                <button onclick="window.open('https://docs.google.com/spreadsheets/d/131OAfDjrf_5rA7Rjezye2aogyub7fSs4OnJltqU36tY', '_blank')" 
                        style="background: #f1f5f9; color: #64748b; border: none; padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; font-weight: 600;">
                    ☁️ 開啟雲端試算表
                </button>
            </div>
        </div>
    </div>

    <div id="memoModal" class="modal-backdrop">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal('memoModal')">✕</button>
            <h2 class="modal-title">📝 生活日記</h2>
            <div class="modal-body">
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label>心情</label>
                        <select id="memo_mood" class="form-input" onchange="checkMemoFields()">
                            <option value="">請選擇...</option>
                            <option value="喜">😊 喜</option>
                            <option value="怒">😡 怒</option>
                            <option value="哀">😢 哀</option>
                            <option value="樂">😄 樂</option>
                            <option value="平靜">😌 平靜</option>
                            <option value="感恩">🙏 感恩</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>天氣</label>
                        <select id="memo_weather" class="form-input" onchange="checkMemoFields()">
                            <option value="">請選擇...</option>
                            <option value="晴">☀️ 晴</option>
                            <option value="陰">☁️ 陰</option>
                            <option value="下雨">🌧️ 下雨</option>
                            <option value="颱風">🌀 颱風</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>今天做了什麼重要的事情？</label>
                    <textarea id="memo_content" class="form-input" rows="4" placeholder="寫下您的重要紀事..." oninput="checkMemoFields()"></textarea>
                </div>
                <button id="submitMemoBtn" onclick="saveMemo()" class="submit-btn btn-memo disabled" disabled style="margin-bottom: 15px;">儲存日記</button>
                
                <div id="memo_list" style="max-height: 250px; overflow-y: auto; border-top: 1px solid #f1f5f9; padding-top: 15px; margin-bottom: 15px;">
                    <!-- 過往記事清單 -->
                </div>

                <div style="text-align: center;">
                    <a href="https://docs.google.com/spreadsheets/d/1qFjXISdGcWaJ_7sTiFiw9OG8Hwxi9xF05IB6JIGO9Og/edit" target="_blank" style="color: #64748b; font-size: 0.9rem; text-decoration: none; border-bottom: 1px solid #cbd5e1; padding-bottom: 2px;">🔗 打開雲端日記本</a>
                </div>
            </div>
        </div>
    </div>

    <!-- 願望清單彈窗 -->
    <div id="wishlistModal" class="modal-backdrop">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal('wishlistModal')">✕</button>
            <h2 class="modal-title">🎁 願望清單</h2>
            <div class="modal-body">
                <!-- 許願新增區 -->
                <div style="background: #fff5f5; padding: 15px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 12px rgba(255, 245, 245, 0.5); border: 1px solid #fee2e2;">
                    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <input type="text" id="wish_name" class="form-input" placeholder="您想要什麼？" style="flex: 2; margin-bottom: 0;">
                        <input type="number" id="wish_price" class="form-input" placeholder="價格" style="flex: 1.2; margin-bottom: 0;">
                        <button onclick="saveWish()" style="background: #f97316; color: white; border: none; width: 45px; height: 45px; border-radius: 14px; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; box-shadow: 0 4px 10px rgba(249, 115, 22, 0.3);">
                            ＋
                        </button>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 10px;">
                        <div class="wish-tags" style="display: flex; gap: 6px; flex-wrap: wrap; flex: 1;">
                            <span class="wish-tag active purple" onclick="selectWishTag(this, '必買')" style="white-space: nowrap; font-size: 0.85rem; padding: 6px 10px;">💎 必買</span>
                            <span class="wish-tag green" onclick="selectWishTag(this, '可買')" style="white-space: nowrap; font-size: 0.85rem; padding: 6px 10px;">✅ 可買</span>
                            <span class="wish-tag yellow" onclick="selectWishTag(this, '可不買')" style="white-space: nowrap; font-size: 0.85rem; padding: 6px 10px;">🤔 可不買</span>
                        </div>
                        <div id="wish_summary" style="font-size: 0.78rem; color: #f97316; font-weight: 800; line-height: 1.2; text-align: right; flex-shrink: 0; min-width: 75px;">
                            <!-- 預算總計 -->
                        </div>
                    </div>
                    <input type="hidden" id="wish_category" value="必買">
                    <input type="hidden" id="wish_note" value=""> <!-- 保持欄位存在但隱藏 -->

                    <!-- 願望清單 -->
                    <div id="wish_list">
                        <div style="text-align: center; padding: 30px; color: #94a3b8;">
                            <div class="loading-spinner" style="margin-bottom: 10px;">⌛</div>
                            正在讀取願望清單...
                        </div>
                    </div>
                </div>
                


                <div style="text-align: center; margin-top: 10px; padding: 10px 0;">
                    <a href="https://docs.google.com/spreadsheets/d/1jPd8NKi3Lv9CID7KEP9u5kD9W8zG9Q4o-0vq3OyFeuE/edit" target="_blank" style="color: #64748b; font-size: 0.85rem; text-decoration: none; border-bottom: 1px solid #cbd5e1; padding-bottom: 2px;">🔗 打開雲端願望清單</a>
                </div>
            </div>
        </div>
    </div>

    <!-- 手動記帳彈窗 -->
    <div id="expenseModal" class="modal-backdrop">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal('expenseModal')">✕</button>
            <h2 class="modal-title">💰 手動記帳</h2>
            <div class="modal-body">
                <div style="display: flex; gap: 12px; margin-bottom: 15px;">
                    <div class="form-group" style="flex: 1.5; margin-bottom: 0;">
                        <label>消費項目</label>
                        <input type="text" id="expense_item" class="form-input" placeholder="吃了什麼？" style="margin-bottom: 0;">
                    </div>
                    <div class="form-group" style="flex: 1; margin-bottom: 0;">
                        <label>分類</label>
                        <select id="expense_category" class="form-input" style="margin-bottom: 0;">
                            <option value="食">食</option>
                            <option value="衣">衣</option>
                            <option value="住">住</option>
                            <option value="行">行</option>
                            <option value="育">育</option>
                            <option value="樂">樂</option>
                            <option value="醫">醫</option>
                            <option value="投資">投資</option>
                            <option value="未分類">未分類</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>金額 (支援加減乘除)</label>
                    <div id="calc_history" class="calc-history" style="text-align: right; font-size: 0.9rem; color: #94a3b8; height: 1.2rem; margin-bottom: 5px;"></div>
                    <div style="display: flex; gap: 10px; align-items: stretch;">
                        <input type="text" id="expense_amount" class="form-input" placeholder="0" readonly style="flex: 1; text-align: right; font-size: 1.5rem; font-weight: 700; color: #10b981; background: #f8fafc; margin-bottom: 0;">
                        <button class="calc-btn op" style="width: 50px; margin-bottom: 0;" onclick="backspaceCalc()">←</button>
                    </div>
                    
                    <!-- 簡易計算機按鈕 -->
                    <div class="calc-grid">
                        <!-- 第一排：功能按鍵 -->
                        <button class="calc-btn danger" onclick="clearCalc()">AC</button>
                        <button class="calc-btn op" onclick="clearEntry()">C</button>
                        <button class="calc-btn op" onclick="appendCalc('%')">%</button>
                        <button class="calc-btn op" onclick="appendCalc('/')">÷</button>
                        
                        <!-- 第二排：7 8 9 * -->
                        <button class="calc-btn" onclick="appendCalc('7')">7</button>
                        <button class="calc-btn" onclick="appendCalc('8')">8</button>
                        <button class="calc-btn" onclick="appendCalc('9')">9</button>
                        <button class="calc-btn op" onclick="appendCalc('*')">×</button>
                        
                        <!-- 第三排：4 5 6 - -->
                        <button class="calc-btn" onclick="appendCalc('4')">4</button>
                        <button class="calc-btn" onclick="appendCalc('5')">5</button>
                        <button class="calc-btn" onclick="appendCalc('6')">6</button>
                        <button class="calc-btn op" onclick="appendCalc('-')">-</button>
                        
                        <!-- 第四排：1 2 3 + -->
                        <button class="calc-btn" onclick="appendCalc('1')">1</button>
                        <button class="calc-btn" onclick="appendCalc('2')">2</button>
                        <button class="calc-btn" onclick="appendCalc('3')">3</button>
                        <button class="calc-btn op" onclick="appendCalc('+')">+</button>
                        
                        <!-- 第五排：0 00 . = -->
                        <button class="calc-btn" onclick="appendCalc('0')">0</button>
                        <button class="calc-btn" onclick="appendCalc('00')">00</button>
                        <button class="calc-btn" onclick="appendCalc('.')">.</button>
                        <button class="calc-btn equal" onclick="calculateResult()">=</button>
                    </div>
                </div>
                <button id="submitExpense" class="submit-btn btn-expense">確認記帳</button>
            </div>
        </div>
    </div>

    <!-- 自定義確認彈窗 (V10.8 Ultra-Premium) -->
    <div id="confirmModal" class="modal-backdrop" style="z-index: 2000; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px);">
        <div class="modal-content" style="max-width: 300px; padding: 28px 24px; text-align: center; border-radius: 28px; border: 1px solid rgba(255,255,255,0.8); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
            <div id="confirm_icon_container" style="margin-bottom: 18px; display: flex; justify-content: center;">
                <svg id="confirm_svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.9;">
                    <path d="M3 6h18"></path>
                    <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                    <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                </svg>
            </div>
            <h3 id="confirm_title" style="font-size: 1.2rem; font-weight: 800; color: #0f172a; margin-bottom: 8px;">確定刪除？</h3>
            <p id="confirm_msg" style="font-size: 0.85rem; color: #64748b; line-height: 1.6; margin-bottom: 28px; padding: 0 15px;">此操作將無法復原，請確認後再繼續。</p>
            <div style="display: flex; gap: 10px;">
                <button onclick="closeConfirm(false)" style="flex: 1; padding: 12px; border-radius: 16px; border: none; background: #f1f5f9; color: #475569; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: all 0.2s;">取消</button>
                <button id="confirm_yes_btn" style="flex: 1.2; padding: 12px; border-radius: 16px; border: none; background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); color: white; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.35);">確定刪除</button>
            </div>
        </div>
    </div>

    <!-- 自定義新增類別彈窗 (V10.8 Ultra-Premium) -->
    <div id="catInputModal" class="modal-backdrop" style="z-index: 2000; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px);">
        <div class="modal-content" style="max-width: 300px; padding: 25px; border-radius: 28px; border: 1px solid rgba(255,255,255,0.8); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
            <h3 style="font-size: 1.15rem; font-weight: 800; color: #0f172a; margin-bottom: 20px; text-align: center;">新增自定義類別</h3>
            <div style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
                <div id="new_cat_preview_icon" style="width: 70px; height: 70px; border-radius: 20px; background: #f8fafc; border: 1.5px solid #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
                    📌
                </div>
                <div class="form-group" style="width: 100%; margin-bottom: 5px;">
                    <label style="font-size: 0.8rem; color: #64748b; margin-bottom: 5px; display: block; text-align: center;">類別名稱</label>
                    <input type="text" id="new_cat_name" class="form-input" placeholder="例如：學習、運動..." style="margin-bottom: 0; text-align: center; font-size: 1.1rem; font-weight: 700;" oninput="suggestEmoji(this.value)">
                </div>
            </div>
            <!-- Emoji 建議區 -->
            <div id="cat_emoji_suggestions" style="display: flex; gap: 10px; overflow-x: auto; padding: 15px 0; min-height: 50px; justify-content: center; -webkit-overflow-scrolling: touch;">
                <!-- 動態建議 -->
            </div>
            <input type="hidden" id="new_cat_icon_hidden" value="📌">
            
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button onclick="closeCatInput(false)" style="flex: 1; padding: 12px; border-radius: 16px; border: none; background: #f1f5f9; color: #475569; font-weight: 700; font-size: 0.9rem; cursor: pointer;">取消</button>
                <button onclick="closeCatInput(true)" style="flex: 1.2; padding: 12px; border-radius: 16px; border: none; background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; font-weight: 700; font-size: 0.9rem; cursor: pointer; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.35);">確定新增</button>
            </div>
        </div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key={{ maps_api_key }}&libraries=places&callback=initMap" async defer></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
