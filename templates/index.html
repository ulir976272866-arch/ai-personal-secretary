<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 行事曆助理</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="app-container">
        <!-- Header -->
        <div class="header">
            <h1>AI 專屬秘書</h1>
            <p>您的個人智慧管家</p>
        </div>

        <!-- 功能選單區域 -->
    <div class="quick-actions">
        <!-- 第一排：最直覺的手動新增 -->
        <div class="action-row main-actions">
            <button class="action-btn schedule-add" id="manualScheduleBtn">
                <span class="icon">➕</span> 新增行程
            </button>
            <button class="action-btn expense-add" id="manualExpenseBtn">
                <span class="icon">💰</span> 我要記帳
            </button>
        </div>
        
        <!-- 第二排：階層式查詢 -->
        <div class="action-row query-actions">
            <div class="menu-group">
                <button class="menu-trigger" id="scheduleMenuBtn">行程查詢 ▾</button>
                <div class="menu-dropdown" id="scheduleMenu">
                    <button onclick="handleSend('今日行程')">今日行程</button>
                    <button onclick="handleSend('這週行程')">這週行程</button>
                </div>
            </div>
            <div class="menu-group">
                <button class="menu-trigger" id="ledgerMenuBtn">財務帳本 ▾</button>
                <div class="menu-dropdown" id="ledgerMenu">
                    <button onclick="handleSend('本月合計')">本月合計</button>
                    <button onclick="handleSend('開啟記帳表單')">開啟帳本</button>
                </div>
            </div>
        </div>
    </div>

        <!-- 對話紀錄區 -->
        <div id="chat-history">
            <div class="message ai-message">
                您好！我是您的私人 AI 行事曆助理。您可以直接跟我聊天，或使用上方的功能按鈕。
            </div>
        </div>

        <button id="clearBtn" class="clear-btn" title="清空對話">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y1="17"></line><line x1="14" y1="11" x2="14" y1="17"></line></svg>
        </button>

        <!-- 底部輸入區域 -->
        <div class="input-area">
            <div class="input-container">
                <button id="voiceBtn" class="voice-btn">
                    🎙️
                </button>
                <input type="text" id="userInput" placeholder="輸入行程或指令...">
                <button id="sendBtn" class="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- 手動行程彈窗 -->
    <div id="scheduleModal" class="modal-backdrop">
        <div class="modal-content">
            <button class="close-modal">✕</button>
            <h2 class="modal-title">➕ 新增行程</h2>
            <div class="modal-body">
                <div class="form-group">
                    <label>行程名稱</label>
                    <input type="text" id="manual_title" class="form-input" placeholder="例如：開會、回家...">
                </div>
                <div style="display: flex; gap: 12px; align-items: flex-end; margin-bottom: 20px;">
                    <div style="flex: 1;">
                        <label style="display: block; font-size: 0.8rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 8px;">日期</label>
                        <input type="date" id="manual_date" class="form-input">
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px; padding-bottom: 12px;">
                        <input type="checkbox" id="is_all_day" style="width: 20px; height: 20px; cursor: pointer;">
                        <label for="is_all_day" style="margin-bottom: 0; cursor: pointer; font-size: 0.9rem; font-weight: 600;">全天</label>
                    </div>
                </div>
                <div id="timeInputGroup" class="form-group">
                    <label>時間</label>
                    <input type="time" id="manual_time" class="form-input">
                </div>
                <div class="form-group">
                    <label>地點 / 視訊網址</label>
                    <input type="text" id="manual_location" class="form-input" placeholder="地址或 Google Meet 連結">
                </div>
                <button id="submitSchedule" class="submit-btn btn-schedule">確認加入日曆</button>
            </div>
        </div>
    </div>

    <!-- 手動記帳彈窗 -->
    <div id="expenseModal" class="modal-backdrop">
        <div class="modal-content">
            <button class="close-modal">✕</button>
            <h2 class="modal-title">💰 手動記帳</h2>
            <div class="modal-body">
                <div class="form-group">
                    <label>消費項目</label>
                    <input type="text" id="expense_item" class="form-input" placeholder="吃了什麼？買了什麼？">
                </div>
                <div class="form-group">
                    <label>金額 (支援加減乘除)</label>
                    <input type="text" id="expense_amount" class="form-input" placeholder="0" readonly style="text-align: right; font-size: 1.5rem; font-weight: 700; color: #10b981; background: #f8fafc;">
                    
                    <!-- 簡易計算機按鈕 -->
                    <div class="calc-grid">
                        <button class="calc-btn" onclick="appendCalc('7')">7</button>
                        <button class="calc-btn" onclick="appendCalc('8')">8</button>
                        <button class="calc-btn" onclick="appendCalc('9')">9</button>
                        <button class="calc-btn op" onclick="appendCalc('+')">+</button>
                        
                        <button class="calc-btn" onclick="appendCalc('4')">4</button>
                        <button class="calc-btn" onclick="appendCalc('5')">5</button>
                        <button class="calc-btn" onclick="appendCalc('6')">6</button>
                        <button class="calc-btn op" onclick="appendCalc('-')">-</button>
                        
                        <button class="calc-btn" onclick="appendCalc('1')">1</button>
                        <button class="calc-btn" onclick="appendCalc('2')">2</button>
                        <button class="calc-btn" onclick="appendCalc('3')">3</button>
                        <button class="calc-btn op" onclick="appendCalc('*')">×</button>
                        
                        <button class="calc-btn danger" onclick="clearCalc()">C</button>
                        <button class="calc-btn" onclick="appendCalc('0')">0</button>
                        <button class="calc-btn" onclick="calculateResult()">=</button>
                        <button class="calc-btn op" onclick="appendCalc('/')">÷</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>分類</label>
                    <select id="expense_category" class="form-input">
                        <option value="食">食</option>
                        <option value="衣">衣</option>
                        <option value="住">住</option>
                        <option value="行">行</option>
                        <option value="育">育</option>
                        <option value="樂">樂</option>
                        <option value="醫">醫</option>
                        <option value="投資">投資</option>
                        <option value="未分類">未分類</option>
                    </select>
                </div>
                <button id="submitExpense" class="submit-btn btn-expense">確認記帳</button>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
